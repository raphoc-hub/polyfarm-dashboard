<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #161616;
  --surface3: #1a1a1a;
  --border: rgba(255,255,255,0.06);
  --border-focus: rgba(255,255,255,0.12);
  --accent: #7c3aed;
  --accent2: #2563eb;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --text: #fafafa;
  --text2: #a1a1aa;
  --text3: #52525b;
  --text4: #27272a;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ─── TOPBAR ─── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}

.logo span {
  color: var(--accent);
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
  letter-spacing: 0.05em;
}

.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.topbar-right {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}

/* ─── TABS ─── */
.tabs-container {
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-container::-webkit-scrollbar { display: none; }

.tabs {
  display: flex;
  gap: 0;
  white-space: nowrap;
}

.tab {
  padding: 14px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: -0.01em;
}

.tab:hover { color: var(--text2); }

.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ─── MAIN CONTENT ─── */
.content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── STAT CARDS ─── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  transition: border-color 0.15s;
}

.stat-card:hover { border-color: var(--border-focus); }

.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
}

.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--yellow); }

.stat-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
}

/* ─── CHARTS GRID ─── */
.charts-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

.chart-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.03em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.chart-wrap {
  position: relative;
  height: 200px;
}

/* ─── ACTIVITY FEED ─── */
.activity-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

.section-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.03em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.activity-item:last-child { border-bottom: none; }

.activity-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 1px;
}

.activity-icon.bet { background: rgba(124,58,237,0.12); }
.activity-icon.won { background: rgba(34,197,94,0.12); }
.activity-icon.lost { background: rgba(239,68,68,0.12); }
.activity-icon.skip { background: rgba(82,82,91,0.2); }

.activity-body { flex: 1; min-width: 0; }

.activity-title {
  font-size: 13px;
  color: var(--text);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.activity-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.activity-right {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  margin-top: 1px;
}

/* ─── PILLS ─── */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
  border: 1px solid;
}

.pill-yes { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); color: var(--green); }
.pill-no { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: var(--red); }
.pill-bet { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.3); color: #a78bfa; }
.pill-skip { background: rgba(82,82,91,0.15); border-color: rgba(82,82,91,0.3); color: var(--text3); }
.pill-won { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25); color: var(--green); }
.pill-lost { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: var(--red); }
.pill-high { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: var(--green); }
.pill-medium { background: rgba(234,179,8,0.08); border-color: rgba(234,179,8,0.2); color: var(--yellow); }
.pill-low { background: rgba(82,82,91,0.15); border-color: rgba(82,82,91,0.3); color: var(--text3); }

/* ─── POSITION CARDS ─── */
.positions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
}

.position-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  transition: border-color 0.15s;
}

.position-card:hover { border-color: var(--border-focus); }

.position-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.position-market {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
  min-width: 0;
}

.position-market a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s;
}

.position-market a:hover { color: var(--accent); }

.ext-link {
  font-size: 10px;
  color: var(--text3);
  margin-left: 3px;
}

.position-pills {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.position-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}

.pos-stat-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 3px;
}

.pos-stat-value {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
}

.position-expiry {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 10px;
}

.position-reasoning {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── EMPTY STATE ─── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 24px;
  text-align: center;
}

.empty-icon { font-size: 40px; margin-bottom: 14px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--text3); }

/* ─── HISTORY TABLE ─── */
.history-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.summary-item { }
.summary-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.summary-value { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--text); }
.summary-value.green { color: var(--green); }
.summary-value.red { color: var(--red); }

.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--surface2);
  padding: 10px 16px;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

tbody td {
  padding: 11px 16px;
  color: var(--text2);
  vertical-align: middle;
}

tbody td:first-child { color: var(--text); }

.td-mono {
  font-family: var(--mono);
  font-size: 12px;
}

.td-link a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s;
}

.td-link a:hover { color: var(--accent); }

/* ─── DECISIONS LOG ─── */
.decisions-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text3);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font);
}

.filter-btn:hover {
  border-color: var(--border-focus);
  color: var(--text2);
}

.filter-btn.active {
  background: var(--surface2);
  border-color: var(--border-focus);
  color: var(--text);
}

.decisions-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.decision-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
  cursor: pointer;
}

.decision-card:hover { border-color: var(--border-focus); }
.decision-card.expanded { border-color: var(--border-focus); }

.decision-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
}

.decision-pills {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.decision-market {
  flex: 1;
  min-width: 0;
}

.decision-market-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.decision-market-name a {
  color: var(--text);
  text-decoration: none;
}

.decision-market-name a:hover { color: var(--accent); }

.decision-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.decision-meta-item {
  text-align: right;
}

.decision-meta-label {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.decision-meta-value {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
}

.decision-timestamp {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  flex-shrink: 0;
}

.conviction-bar-wrap {
  padding: 0 16px 12px;
  margin-top: -6px;
}

.conviction-bar-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.conviction-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.4s ease;
}

.decision-expanded {
  border-top: 1px solid var(--border);
  padding: 16px;
  display: none;
}

.decision-card.expanded .decision-expanded { display: block; }

.expanded-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.expanded-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.bayes-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.bayes-item {
  font-size: 12px;
  color: var(--text2);
  font-family: var(--mono);
  padding: 5px 8px;
  background: var(--surface2);
  border-radius: 4px;
  border: 1px solid var(--border);
}

.signal-table {
  width: 100%;
  border-collapse: collapse;
}

.signal-table tr { border-bottom: 1px solid var(--border); }
.signal-table tr:last-child { border-bottom: none; }

.signal-table td {
  padding: 6px 8px;
  font-size: 12px;
}

.signal-table td:first-child {
  color: var(--text3);
  font-weight: 500;
  width: 90px;
}

.signal-table td:last-child { color: var(--text2); font-family: var(--mono); }

.reasoning-block {
  grid-column: 1 / -1;
  margin-top: 0;
}

.reasoning-text {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 6px;
  border: 1px solid var(--border);
}

.key-signal-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(37,99,235,0.1);
  border: 1px solid rgba(37,99,235,0.25);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  color: #60a5fa;
  margin-bottom: 10px;
}

/* ─── SYSTEM TAB ─── */
.system-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.system-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

.system-card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}

.config-table {
  width: 100%;
  border-collapse: collapse;
}

.config-table tr {
  border-bottom: 1px solid var(--border);
}

.config-table tr:last-child { border-bottom: none; }

.config-table td {
  padding: 9px 0;
  font-size: 13px;
}

.config-table td:first-child {
  color: var(--text3);
  width: 50%;
}

.config-table td:last-child {
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  text-align: right;
}

.signal-bar-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.signal-bar-item {}
.signal-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 5px;
}

.signal-bar-track {
  height: 4px;
  background: var(--border-focus);
  border-radius: 2px;
  overflow: hidden;
}

.signal-bar-fill {
  height: 100%;
  background: var(--accent2);
  border-radius: 2px;
  transition: width 0.6s ease;
}

/* ─── CHEVRON ─── */
.chevron {
  width: 14px;
  height: 14px;
  color: var(--text3);
  flex-shrink: 0;
  transition: transform 0.2s ease;
}

.decision-card.expanded .chevron { transform: rotate(180deg); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .expanded-grid { grid-template-columns: 1fr; }
  .system-grid { grid-template-columns: 1fr; }
  .positions-grid { grid-template-columns: 1fr; }
  .decision-meta { display: none; }
  .topbar { padding: 0 16px; }
  .content { padding: 20px 16px; }
  .tabs-container { padding: 0 16px; }
  .history-summary { gap: 20px; }
}

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .stat-value { font-size: 20px; }
}

/* ─── SCROLL ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--text4); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ─── COUNTER ANIMATION ─── */
.counter { display: inline-block; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">Poly<span>Farm</span></div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>
  <div class="topbar-right" id="timestamp"></div>
</header>

<!-- TABS -->
<nav class="tabs-container">
  <div class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="positions">Positions</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="decisions">Decisions Log</button>
    <button class="tab" data-tab="system">System</button>
  </div>
</nav>

<!-- CONTENT -->
<main class="content">

  <!-- ── TAB: OVERVIEW ── -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Portfolio Value</div>
        <div class="stat-value" id="stat-value">—</div>
        <div class="stat-sub" id="stat-value-sub">Cash + Open Bets</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net P&amp;L</div>
        <div class="stat-value" id="stat-pnl">—</div>
        <div class="stat-sub" id="stat-pnl-sub">vs $100 start</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="stat-wr">—</div>
        <div class="stat-sub" id="stat-wr-sub">Closed bets</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open Positions</div>
        <div class="stat-value" id="stat-open">—</div>
        <div class="stat-sub" id="stat-open-sub">Active stakes</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Equity Curve</div>
        <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">P&amp;L Per Bet</div>
        <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
      </div>
    </div>

    <div class="activity-card">
      <div class="section-title">Recent Activity</div>
      <div id="activity-feed"></div>
    </div>
  </div>

  <!-- ── TAB: POSITIONS ── -->
  <div class="tab-panel" id="tab-positions">
    <div class="positions-grid" id="positions-grid"></div>
  </div>

  <!-- ── TAB: HISTORY ── -->
  <div class="tab-panel" id="tab-history">
    <div class="history-summary" id="history-summary"></div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Market</th>
            <th>Position</th>
            <th>Stake</th>
            <th>Payout</th>
            <th>P&amp;L</th>
            <th>Entry</th>
            <th>Result</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── TAB: DECISIONS LOG ── -->
  <div class="tab-panel" id="tab-decisions">
    <div class="decisions-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="bets">Bets</button>
      <button class="filter-btn" data-filter="skips">Skips</button>
    </div>
    <div class="decisions-list" id="decisions-list"></div>
  </div>

  <!-- ── TAB: SYSTEM ── -->
  <div class="tab-panel" id="tab-system">
    <div class="system-grid">
      <div>
        <div class="system-card" style="margin-bottom:12px">
          <div class="system-card-title">Scanner Config</div>
          <table class="config-table" id="config-table"></table>
        </div>
        <div class="system-card">
          <div class="system-card-title">Portfolio State</div>
          <table class="config-table" id="portfolio-state-table"></table>
        </div>
      </div>
      <div>
        <div class="system-card" style="margin-bottom:12px">
          <div class="system-card-title">Edge Distribution</div>
          <div class="chart-wrap"><canvas id="edgeChart"></canvas></div>
        </div>
        <div class="system-card">
          <div class="system-card-title">Signal Win-Rate</div>
          <div class="signal-bar-list" id="signal-bars"></div>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
// ─── UTILS ───
function fmt(n, decimals=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toFixed(decimals);
}
function fmtUSD(n) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  return (n < 0 ? '-' : '') + '$' + abs.toFixed(2);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n * 100).toFixed(1) + '%';
}
function fmtDate(str) {
  if (!str) return '—';
  try {
    const d = new Date(str);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'2-digit' });
  } catch(e) { return str; }
}
function timeAgo(str) {
  if (!str) return '';
  const d = new Date(str);
  const now = new Date();
  const sec = Math.floor((now - d) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec/60) + 'm ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  return Math.floor(sec/86400) + 'd ago';
}
function timeUntil(str) {
  if (!str) return '—';
  const d = new Date(str);
  const now = new Date();
  const sec = Math.floor((d - now) / 1000);
  if (sec < 0) return 'Expired';
  if (sec < 3600) return Math.floor(sec/60) + 'm';
  if (sec < 86400) return Math.floor(sec/3600) + 'h';
  return Math.floor(sec/86400) + 'd';
}
function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

function pill(text, cls) {
  return `<span class="pill pill-${cls.toLowerCase()}">${text}</span>`;
}

function confidenceCls(c) {
  if (!c) return 'low';
  return c.toLowerCase();
}

// ─── TIMESTAMP ───
function updateTimestamp() {
  const el = document.getElementById('timestamp');
  if (!el) return;
  const d = new Date();
  el.textContent = d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) + ' UTC';
}
updateTimestamp();
setInterval(updateTimestamp, 1000);

// ─── TABS ───
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ─── COUNTER ANIMATION ───
function animateCounter(el, target, prefix='', suffix='', decimals=2, duration=600) {
  const start = performance.now();
  const update = (now) => {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = eased * target;
    el.textContent = prefix + Math.abs(val).toFixed(decimals) + suffix;
    if (t < 1) requestAnimationFrame(update);
    else el.textContent = prefix + Math.abs(target).toFixed(decimals) + suffix;
  };
  requestAnimationFrame(update);
}

// ─── DERIVED DATA ───
const P = PORTFOLIO;
const openBets = P.open_bets || [];
const closedBets = P.closed_bets || [];
const totalStaked = openBets.reduce((s, b) => s + (b.stake || 0), 0);
const portfolioValue = (P.cash || 0) + totalStaked;
const totalPL = P.total_pl || 0;
const wins = closedBets.filter(b => b.result === 'WON').length;
const losses = closedBets.filter(b => b.result === 'LOST').length;
const winRate = closedBets.length > 0 ? wins / closedBets.length : null;

// ─── OVERVIEW STATS ───
(function() {
  // Portfolio Value
  const pvEl = document.getElementById('stat-value');
  pvEl.textContent = '$' + portfolioValue.toFixed(2);
  pvEl.className = 'stat-value';
  document.getElementById('stat-value-sub').textContent = `$${fmt(P.cash)} cash + $${fmt(totalStaked)} staked`;

  // P&L
  const plEl = document.getElementById('stat-pnl');
  plEl.textContent = (totalPL >= 0 ? '+' : '') + '$' + Math.abs(totalPL).toFixed(2);
  plEl.className = 'stat-value ' + (totalPL >= 0 ? 'green' : 'red');
  const pct = (totalPL / (P.starting_capital || 100)) * 100;
  document.getElementById('stat-pnl-sub').textContent = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '% return';

  // Win Rate
  const wrEl = document.getElementById('stat-wr');
  if (winRate !== null) {
    wrEl.textContent = (winRate * 100).toFixed(0) + '%';
    wrEl.className = 'stat-value ' + (winRate >= 0.55 ? 'green' : winRate >= 0.4 ? 'yellow' : 'red');
  } else {
    wrEl.textContent = '—';
  }
  document.getElementById('stat-wr-sub').textContent = `${wins}W / ${losses}L from ${closedBets.length} closed`;

  // Open
  const openEl = document.getElementById('stat-open');
  openEl.textContent = openBets.length;
  document.getElementById('stat-open-sub').textContent = `$${fmt(totalStaked)} at risk`;
})();

// ─── EQUITY CHART ───
(function() {
  const ctx = document.getElementById('equityChart').getContext('2d');
  let equity = P.starting_capital || 100;
  const points = [equity];
  const labels = ['Start'];
  const sortedClosed = [...closedBets].sort((a,b) => new Date(a.resolved_at||a.placed_at) - new Date(b.resolved_at||b.placed_at));
  sortedClosed.forEach(b => {
    equity += (b.pl || 0);
    points.push(parseFloat(equity.toFixed(2)));
    labels.push(fmtDate(b.resolved_at || b.placed_at));
  });
  points.push(parseFloat(portfolioValue.toFixed(2)));
  labels.push('Now');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: points,
        borderColor: '#2563eb',
        borderWidth: 2,
        pointRadius: points.map((_, i) => i === 0 || i === points.length-1 ? 4 : 2),
        pointBackgroundColor: '#2563eb',
        pointBorderColor: '#2563eb',
        fill: false,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161616',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#a1a1aa',
          bodyColor: '#fafafa',
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
          callbacks: {
            label: ctx => '$' + ctx.raw.toFixed(2)
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#52525b', font: { size: 10 }, maxTicksLimit: 6 },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#52525b', font: { size: 10, family: "'JetBrains Mono', monospace" }, callback: v => '$'+v },
          border: { display: false }
        }
      }
    }
  });
})();

// ─── P&L BAR CHART ───
(function() {
  const ctx = document.getElementById('pnlChart').getContext('2d');
  const bets = closedBets.slice(-12);
  if (bets.length === 0) {
    ctx.canvas.parentElement.innerHTML = '<div class="empty-state" style="padding:40px 0"><div class="empty-icon">📊</div><div class="empty-sub">No closed bets yet</div></div>';
    return;
  }
  const labels = bets.map((b,i) => b.market ? b.market.slice(0,15)+'…' : `Bet ${i+1}`);
  const data = bets.map(b => b.pl || 0);
  const colors = data.map(v => v >= 0 ? 'rgba(34,197,94,0.8)' : 'rgba(239,68,68,0.8)');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors, borderRadius: 3, borderSkipped: false }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161616',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#a1a1aa',
          bodyColor: '#fafafa',
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
          callbacks: {
            label: ctx => (ctx.raw >= 0 ? '+' : '') + '$' + ctx.raw.toFixed(2)
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#52525b', font: { size: 9 }, maxRotation: 30 },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          ticks: { color: '#52525b', font: { size: 10, family: "'JetBrains Mono', monospace" }, callback: v => '$'+v },
          border: { display: false }
        }
      }
    }
  });
})();

// ─── ACTIVITY FEED ───
(function() {
  const feed = document.getElementById('activity-feed');
  const events = [];

  closedBets.forEach(b => {
    events.push({
      type: b.result === 'WON' ? 'won' : 'lost',
      title: b.market || 'Unknown market',
      meta: `${b.position} · ${fmtDate(b.resolved_at || b.placed_at)}`,
      right: (b.pl >= 0 ? '+' : '') + '$' + Math.abs(b.pl || 0).toFixed(2),
      ts: new Date(b.resolved_at || b.placed_at)
    });
  });

  openBets.forEach(b => {
    events.push({
      type: 'bet',
      title: b.market || 'Unknown market',
      meta: `${b.position} · Placed ${timeAgo(b.placed_at)}`,
      right: '$' + (b.stake || 0).toFixed(2),
      ts: new Date(b.placed_at)
    });
  });

  const skipDecisions = DECISIONS.filter(d => !d.approved);
  skipDecisions.forEach(d => {
    events.push({
      type: 'skip',
      title: d.market_q || 'Unknown',
      meta: `Skipped · ${timeAgo(d.timestamp)}`,
      right: '',
      ts: new Date(d.timestamp)
    });
  });

  events.sort((a, b) => b.ts - a.ts);
  const recent = events.slice(0, 8);

  if (recent.length === 0) {
    feed.innerHTML = '<div class="empty-state" style="padding:32px 0"><div class="empty-icon">📭</div><div class="empty-sub">No activity yet</div></div>';
    return;
  }

  const icons = { bet: '⚡', won: '✅', lost: '❌', skip: '⏭' };
  feed.innerHTML = recent.map(e => `
    <div class="activity-item">
      <div class="activity-icon ${e.type}">${icons[e.type]}</div>
      <div class="activity-body">
        <div class="activity-title">${e.title}</div>
        <div class="activity-meta">${e.meta}</div>
      </div>
      ${e.right ? `<div class="activity-right">${e.right}</div>` : ''}
    </div>
  `).join('');
})();

// ─── POSITIONS ───
(function() {
  const grid = document.getElementById('positions-grid');
  if (openBets.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🏦</div>
      <div class="empty-title">No open positions</div>
      <div class="empty-sub">The scanner will place bets when high-edge opportunities are found</div>
    </div>`;
    return;
  }

  grid.innerHTML = openBets.map(b => {
    const slug = b.slug || b.market_slug;
    const link = slug ? `https://polymarket.com/event/${slug}` : null;
    const edge = b.estimated_prob && b.entry_price ? (b.estimated_prob - b.entry_price) : null;
    const expiry = timeUntil(b.end_date);
    return `
      <div class="position-card">
        <div class="position-header">
          <div class="position-market">
            ${link
              ? `<a href="${link}" target="_blank" rel="noopener">${b.market || 'Unknown'}<span class="ext-link">↗</span></a>`
              : (b.market || 'Unknown')
            }
          </div>
          <div class="position-pills">
            ${pill(b.position || '?', b.position === 'YES' ? 'yes' : 'no')}
            ${b.confidence ? pill(b.confidence, confidenceCls(b.confidence)) : ''}
          </div>
        </div>
        <div class="position-stats">
          <div>
            <div class="pos-stat-label">Stake</div>
            <div class="pos-stat-value">$${fmt(b.stake)}</div>
          </div>
          <div>
            <div class="pos-stat-label">Entry</div>
            <div class="pos-stat-value">${fmtPct(b.entry_price)}</div>
          </div>
          <div>
            <div class="pos-stat-label">Model</div>
            <div class="pos-stat-value">${fmtPct(b.estimated_prob)}</div>
          </div>
          <div>
            <div class="pos-stat-label">Edge</div>
            <div class="pos-stat-value" style="color:${edge > 0 ? 'var(--green)' : 'var(--red)'}">
              ${edge !== null ? (edge > 0 ? '+' : '') + (edge * 100).toFixed(1) + 'pp' : '—'}
            </div>
          </div>
          <div>
            <div class="pos-stat-label">Payout</div>
            <div class="pos-stat-value">$${fmt(b.potential_payout)}</div>
          </div>
          <div>
            <div class="pos-stat-label">Expires</div>
            <div class="pos-stat-value">${expiry}</div>
          </div>
        </div>
        ${b.reasoning ? `<div class="position-reasoning">${b.reasoning}</div>` : ''}
      </div>
    `;
  }).join('');
})();

// ─── HISTORY ───
(function() {
  const summary = document.getElementById('history-summary');
  const tbody = document.getElementById('history-tbody');
  const totalReturn = closedBets.reduce((s, b) => s + (b.pl || 0), 0);
  summary.innerHTML = `
    <div class="summary-item"><div class="summary-label">Total Bets</div><div class="summary-value">${closedBets.length}</div></div>
    <div class="summary-item"><div class="summary-label">Wins</div><div class="summary-value green">${wins}</div></div>
    <div class="summary-item"><div class="summary-label">Losses</div><div class="summary-value red">${losses}</div></div>
    <div class="summary-item"><div class="summary-label">Win Rate</div><div class="summary-value ${winRate >= 0.5 ? 'green' : 'red'}">${winRate !== null ? (winRate*100).toFixed(0)+'%' : '—'}</div></div>
    <div class="summary-item"><div class="summary-label">Total Return</div><div class="summary-value ${totalReturn >= 0 ? 'green' : 'red'}">${(totalReturn >= 0 ? '+' : '') + '$' + Math.abs(totalReturn).toFixed(2)}</div></div>
  `;

  if (closedBets.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">No closed bets yet</td></tr>';
    return;
  }

  const sorted = [...closedBets].sort((a,b) => new Date(b.resolved_at||b.placed_at) - new Date(a.resolved_at||a.placed_at));
  tbody.innerHTML = sorted.map(b => {
    const slug = b.slug || b.market_slug;
    const link = slug ? `https://polymarket.com/event/${slug}` : null;
    const edge = b.estimated_prob && b.entry_price ? b.estimated_prob - b.entry_price : null;
    const pl = b.pl || 0;
    return `<tr>
      <td class="td-link">${link ? `<a href="${link}" target="_blank" rel="noopener">${b.market || '—'}<span class="ext-link">↗</span></a>` : (b.market || '—')}</td>
      <td>${pill(b.position || '?', b.position === 'YES' ? 'yes' : 'no')}</td>
      <td class="td-mono">$${fmt(b.stake)}</td>
      <td class="td-mono">$${fmt(b.potential_payout)}</td>
      <td class="td-mono" style="color:${pl >= 0 ? 'var(--green)' : 'var(--red)'}">${(pl >= 0 ? '+' : '')}$${Math.abs(pl).toFixed(2)}</td>
      <td class="td-mono">${fmtPct(b.entry_price)}</td>
      <td>${pill(b.result || '?', b.result === 'WON' ? 'won' : 'lost')}</td>
      <td style="color:var(--text3);font-size:12px">${fmtDate(b.resolved_at || b.placed_at)}</td>
    </tr>`;
  }).join('');
})();

// ─── DECISIONS LOG ───
(function() {
  let currentFilter = 'all';
  const list = document.getElementById('decisions-list');

  function getConvictionColor(conv) {
    if (conv >= 70) return 'var(--green)';
    if (conv >= 50) return 'var(--yellow)';
    return 'var(--red)';
  }

  function renderDecisions() {
    let filtered = [...DECISIONS].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    if (currentFilter === 'bets') filtered = filtered.filter(d => d.approved);
    if (currentFilter === 'skips') filtered = filtered.filter(d => !d.approved);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No decisions found</div>
        <div class="empty-sub">Scanner decisions will appear here</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map((d, i) => {
      const isBet = d.approved;
      const verdict = isBet ? 'BET' : 'SKIP';
      const verdictCls = isBet ? 'bet' : 'skip';
      const dirCls = d.direction === 'YES' ? 'yes' : 'no';
      const edge = d.edge || 0;
      const conv = d.conviction || 0;
      const convColor = getConvictionColor(conv);

      const marketName = d.market_q || 'Unknown market';
      const marketEl = d.polymarket_url
        ? `<a href="${d.polymarket_url}" target="_blank" rel="noopener">${marketName}<span class="ext-link">↗</span></a>`
        : marketName;

      const bayes = (d.bayes_updates || []).map(u => `<li class="bayes-item">${u}</li>`).join('');
      const signals = d.signal_breakdown
        ? Object.entries(d.signal_breakdown).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')
        : '';

      return `
        <div class="decision-card" data-idx="${i}">
          <div class="decision-header">
            <div class="decision-pills">
              ${pill(verdict, verdictCls)}
              ${d.direction ? pill(d.direction, dirCls) : ''}
            </div>
            <div class="decision-market">
              <div class="decision-market-name">${marketEl}</div>
            </div>
            <div class="decision-meta">
              <div class="decision-meta-item">
                <div class="decision-meta-label">Price</div>
                <div class="decision-meta-value">${fmtPct(d.price)}</div>
              </div>
              <div class="decision-meta-item">
                <div class="decision-meta-label">Model</div>
                <div class="decision-meta-value">${fmtPct(d.posterior)}</div>
              </div>
              <div class="decision-meta-item">
                <div class="decision-meta-label">Edge</div>
                <div class="decision-meta-value" style="color:${edge > 0 ? 'var(--green)' : 'var(--text2)'}">${(edge*100).toFixed(1)}pp</div>
              </div>
              ${isBet ? `<div class="decision-meta-item"><div class="decision-meta-label">Stake</div><div class="decision-meta-value">$${fmt(d.stake)}</div></div>` : ''}
            </div>
            <div class="decision-timestamp">${timeAgo(d.timestamp)}</div>
            <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 6l4 4 4-4"/>
            </svg>
          </div>
          <div class="conviction-bar-wrap">
            <div class="conviction-bar-track">
              <div class="conviction-bar-fill" style="width:${clamp(conv,0,100)}%;background:${convColor}"></div>
            </div>
          </div>
          <div class="decision-expanded">
            <div class="expanded-grid">
              ${bayes ? `
              <div>
                <div class="expanded-section-title">Bayesian Updates</div>
                <ul class="bayes-list">${bayes}</ul>
              </div>` : '<div></div>'}
              ${signals ? `
              <div>
                <div class="expanded-section-title">Signal Breakdown</div>
                <table class="signal-table">${signals}</table>
              </div>` : '<div></div>'}
              <div class="reasoning-block">
                ${d.key_signal ? `<div class="key-signal-badge">🔑 ${d.key_signal}</div>` : ''}
                <div class="expanded-section-title">Reasoning</div>
                <div class="reasoning-text">${d.reasoning || d.reason || 'No reasoning provided'}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // click to expand
    list.querySelectorAll('.decision-card').forEach(card => {
      card.querySelector('.decision-header').addEventListener('click', () => {
        card.classList.toggle('expanded');
      });
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderDecisions();
    });
  });

  renderDecisions();
})();

// ─── SYSTEM TAB ───
(function() {
  // Config table
  const configData = [
    ['Model', 'Bayesian + Kelly'],
    ['Min Edge', '5pp'],
    ['Kelly Fraction', '0.25×'],
    ['Max Stake', '$20'],
    ['Min Stake', '$2'],
    ['Markets/Scan', DECISIONS.length || '—'],
    ['Scan Interval', '30 min'],
    ['Strategy', 'Paper trading'],
  ];
  document.getElementById('config-table').innerHTML = configData.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  // Portfolio state table
  const stateData = [
    ['Starting Capital', '$' + fmt(P.starting_capital)],
    ['Cash Available', '$' + fmt(P.cash)],
    ['Total Staked', '$' + fmt(totalStaked)],
    ['Portfolio Value', '$' + fmt(portfolioValue)],
    ['Net P&L', (totalPL >= 0 ? '+' : '') + '$' + Math.abs(totalPL).toFixed(2)],
    ['Open Bets', openBets.length],
    ['Closed Bets', closedBets.length],
    ['Win Rate', winRate !== null ? (winRate*100).toFixed(0)+'%' : '—'],
  ];
  document.getElementById('portfolio-state-table').innerHTML = stateData.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  // Edge distribution histogram
  const edges = DECISIONS.filter(d => d.edge != null).map(d => d.edge * 100);
  const edgeCtx = document.getElementById('edgeChart').getContext('2d');
  if (edges.length === 0) {
    edgeCtx.canvas.parentElement.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">No edge data</div>';
  } else {
    const bins = [-20,-15,-10,-5,0,5,10,15,20,25,30];
    const counts = new Array(bins.length-1).fill(0);
    edges.forEach(e => {
      for (let i = 0; i < bins.length-1; i++) {
        if (e >= bins[i] && e < bins[i+1]) { counts[i]++; break; }
      }
    });
    const binLabels = bins.slice(0,-1).map((b,i) => `${b}–${bins[i+1]}pp`);
    const barColors = bins.slice(0,-1).map(b => b >= 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)');

    new Chart(edgeCtx, {
      type: 'bar',
      data: { labels: binLabels, datasets: [{ data: counts, backgroundColor: barColors, borderRadius: 3, borderSkipped: false }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#161616',
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1,
            titleColor: '#a1a1aa',
            bodyColor: '#fafafa',
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#52525b', font: { size: 9 }, maxRotation: 30 }, border: { display: false } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#52525b', font: { size: 10 }, stepSize: 1 }, border: { display: false } }
        }
      }
    });
  }

  // Signal win-rate bars
  const signalStats = {};
  closedBets.forEach(b => {
    // check if this bet has a matching decision
    const dec = DECISIONS.find(d => d.market_id === b.market_id || d.market_slug === b.slug);
    if (dec && dec.signal_breakdown) {
      Object.entries(dec.signal_breakdown).forEach(([sig, val]) => {
        if (!signalStats[sig]) signalStats[sig] = { wins: 0, total: 0 };
        signalStats[sig].total++;
        if (b.result === 'WON') signalStats[sig].wins++;
      });
    }
  });

  const signalBars = document.getElementById('signal-bars');
  const sigEntries = Object.entries(signalStats);
  if (sigEntries.length === 0) {
    // fallback: show signal agreement distribution from DECISIONS
    const approved = DECISIONS.filter(d => d.approved && d.signal_agreement != null);
    if (approved.length > 0) {
      const sigs = ['CVD', 'OrderBook', 'Math', 'Funding', 'Momentum'];
      const sigCounts = {};
      approved.forEach(d => {
        if (d.signal_breakdown) {
          Object.keys(d.signal_breakdown).forEach(k => {
            sigCounts[k] = (sigCounts[k] || 0) + 1;
          });
        }
      });
      const maxCount = Math.max(...Object.values(sigCounts), 1);
      signalBars.innerHTML = Object.entries(sigCounts).map(([k,v]) => `
        <div class="signal-bar-item">
          <div class="signal-bar-label"><span>${k}</span><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${v} uses</span></div>
          <div class="signal-bar-track"><div class="signal-bar-fill" style="width:${(v/maxCount*100).toFixed(0)}%"></div></div>
        </div>
      `).join('');
    } else {
      signalBars.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">Insufficient data</div>';
    }
  } else {
    const maxWR = 1;
    signalBars.innerHTML = sigEntries.map(([sig, s]) => {
      const wr = s.total > 0 ? s.wins / s.total : 0;
      return `
        <div class="signal-bar-item">
          <div class="signal-bar-label"><span>${sig}</span><span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${(wr*100).toFixed(0)}% WR (${s.wins}/${s.total})</span></div>
          <div class="signal-bar-track"><div class="signal-bar-fill" style="width:${(wr*100).toFixed(0)}%;background:${wr >= 0.5 ? 'var(--green)' : 'var(--red)'}"></div></div>
        </div>
      `;
    }).join('');
  }
})();
</script>
</body>
</html>
