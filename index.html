<style>
:root {
  --bg: #050505;
  --s1: #0d0d0d;
  --s2: #121212;
  --s3: #171717;
  --s4: #1c1c1c;
  --border: rgba(255,255,255,0.06);
  --border-h: rgba(255,255,255,0.10);
  --accent: #6366f1;
  --accent-dim: rgba(99,102,241,0.12);
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.10);
  --red: #f43f5e;
  --red-dim: rgba(244,63,94,0.10);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.10);
  --t1: #f4f4f5;
  --t2: #a1a1aa;
  --t3: #71717a;
  --t4: #3f3f46;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; height: 100%; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--font);
  height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

/* ─── TOPBAR ─── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 44px;
  min-height: 44px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  z-index: 100;
}
.topbar-l { display: flex; align-items: center; gap: 14px; }
.logo { font-size: 14px; font-weight: 700; letter-spacing: -0.03em; color: var(--t1); }
.logo b { color: var(--accent); font-weight: 700; }
.live-ind {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 600; color: var(--green);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.topbar-r { font-size: 11px; color: var(--t3); font-family: var(--mono); }

/* ─── TABS ─── */
.tabs-bar {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  height: 40px;
  min-height: 40px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab {
  position: relative;
  padding: 0 16px;
  height: 40px;
  display: flex;
  align-items: center;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--t3);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s;
  font-family: var(--font);
}
.tab:hover { color: var(--t2); }
.tab.active { color: var(--t1); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 16px; right: 16px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}

/* ─── CONTENT ─── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--t4) transparent;
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--t4); border-radius: 2px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── KPI STRIP ─── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
}
.kpi-label {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.kpi-val {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 600;
  color: var(--t1);
  line-height: 1.1;
}
.kpi-val.green { color: var(--green); }
.kpi-val.red { color: var(--red); }
.kpi-val.amber { color: var(--amber); }
.kpi-sub {
  font-size: 11px;
  color: var(--t4);
  margin-top: 6px;
  font-family: var(--mono);
}
.kpi-delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  margin-left: 8px;
  vertical-align: middle;
}
.kpi-delta.up { background: var(--green-dim); color: var(--green); }
.kpi-delta.down { background: var(--red-dim); color: var(--red); }
.kpi-delta.flat { background: rgba(255,255,255,0.05); color: var(--t3); }

/* ─── CHARTS ─── */
.charts-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.chart-box {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.chart-box-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.chart-wrap {
  position: relative;
  height: 220px;
}

/* ─── ACTIVITY FEED ─── */
.activity-section {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.activity-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.activity-item:last-child { border-bottom: none; }
.activity-icon {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 13px;
  flex-shrink: 0;
}
.activity-icon.bet { background: var(--accent-dim); }
.activity-icon.won { background: var(--green-dim); }
.activity-icon.lost { background: var(--red-dim); }
.activity-icon.skip { background: rgba(255,255,255,0.04); }
.activity-body { flex: 1; min-width: 0; }
.activity-title {
  font-size: 12.5px;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.activity-meta { font-size: 11px; color: var(--t4); }
.activity-right {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--t2);
  flex-shrink: 0;
}

/* ─── PILLS ─── */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  line-height: 1.6;
}
.pill-bet { background: var(--accent-dim); color: var(--accent); }
.pill-skip { background: rgba(255,255,255,0.04); color: var(--t3); }
.pill-yes { background: var(--accent-dim); color: var(--accent); }
.pill-no { background: var(--red-dim); color: var(--red); }
.pill-won { background: var(--green-dim); color: var(--green); }
.pill-lost { background: var(--red-dim); color: var(--red); }

<script>
// ─── UTILS ───
const P = PORTFOLIO;
const openBets = (P.open_bets || []);
const closedBets = (P.closed_bets || []);
const startCap = P.starting_capital || 100;
const totalStaked = openBets.reduce((s, b) => s + (b.stake || 0), 0);
const pv = (P.cash || 0) + totalStaked;
const totalPL = P.total_pl || 0;
const wins = closedBets.filter(b => b.result === 'WON').length;
const losses = closedBets.filter(b => b.result === 'LOST').length;
const wr = closedBets.length > 0 ? wins / closedBets.length : null;

function fmt(n, d=2) { return n == null || isNaN(n) ? '—' : Number(n).toFixed(d); }
function fmtPct(n) { return n == null || isNaN(n) ? '—' : (n * 100).toFixed(1) + '%'; }
function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'2-digit'}); }
  catch { return s; }
}
function timeAgo(s) {
  if (!s) return '';
  const sec = Math.floor((Date.now() - new Date(s)) / 1000);
  if (sec < 0) return 'just now';
  if (sec < 60) return 'just now';
  if (sec < 3600) return Math.floor(sec/60) + 'm ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  return Math.floor(sec/86400) + 'd ago';
}
function timeLeft(s) {
  if (!s) return '—';
  const sec = Math.floor((new Date(s) - Date.now()) / 1000);
  if (sec <= 0) return 'Expired';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h > 24) return Math.floor(h/24) + 'd ' + (h%24) + 'h';
  return h + 'h ' + String(m).padStart(2,'0') + 'm';
}
function pill(t, cls) { return `<span class="pill pill-${cls}">${t}</span>`; }
function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

// ─── CLOCK ───
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent = 'Updated ' + d.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
tick(); setInterval(tick, 1000);

// ─── TABS ───
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

// ─── COUNTER ANIMATION ───
function animateVal(el, target, prefix, suffix, decimals, duration) {
  duration = duration || 800;
  decimals = decimals == null ? 2 : decimals;
  prefix = prefix || '';
  suffix = suffix || '';
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const v = ease * target;
    el.textContent = prefix + Math.abs(v).toFixed(decimals) + suffix;
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = prefix + Math.abs(target).toFixed(decimals) + suffix;
  }
  requestAnimationFrame(step);
}

// ─── KPI ───
(function() {
  const pvEl = document.getElementById('kpi-pv');
  animateVal(pvEl, pv, '$', '', 2);
  const delta = pv - startCap;
  const deltaPct = (delta / startCap * 100).toFixed(1);
  const cls = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  document.getElementById('kpi-pv-sub').innerHTML =
    `$${fmt(P.cash)} cash · $${fmt(totalStaked)} staked <span class="kpi-delta ${cls}">${delta >= 0 ? '+' : ''}${deltaPct}%</span>`;

  const plEl = document.getElementById('kpi-pl');
  plEl.className = 'kpi-val ' + (totalPL >= 0 ? 'green' : 'red');
  animateVal(plEl, Math.abs(totalPL), totalPL >= 0 ? '+$' : '-$', '', 2);
  const plPct = (totalPL / startCap * 100).toFixed(1);
  document.getElementById('kpi-pl-sub').textContent = (totalPL >= 0 ? '+' : '') + plPct + '% return';

  const wrEl = document.getElementById('kpi-wr');
  if (wr !== null) {
    wrEl.className = 'kpi-val ' + (wr >= 0.55 ? 'green' : wr >= 0.4 ? 'amber' : 'red');
    animateVal(wrEl, wr * 100, '', '%', 0);
  } else {
    wrEl.textContent = '—';
    wrEl.className = 'kpi-val';
  }
  document.getElementById('kpi-wr-sub').textContent = `${wins}W / ${losses}L · ${closedBets.length} closed`;

  const posEl = document.getElementById('kpi-pos');
  posEl.textContent = openBets.length;
  document.getElementById('kpi-pos-sub').textContent = `$${fmt(totalStaked)} exposure`;
})();

// ─── EQUITY CHART ───
(function() {
  const ctx = document.getElementById('equityChart').getContext('2d');
  let eq = startCap;
  const pts = [eq];
  const lbls = ['Start'];
  const sorted = [...closedBets].sort((a,b) => new Date(a.resolved_at||a.placed_at) - new Date(b.resolved_at||b.placed_at));
  sorted.forEach(b => {
    eq += (b.pl || 0);
    pts.push(+eq.toFixed(2));
    lbls.push(fmtDate(b.resolved_at || b.placed_at));
  });
  pts.push(+pv.toFixed(2));
  lbls.push('Now');

  const minY = Math.min(...pts);
  const yMin = Math.floor(minY * 0.8);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: lbls,
      datasets: [{
        data: pts,
        borderColor: '#6366f1',
        borderWidth: 2,
        pointRadius: pts.map((_, i) => i === 0 || i === pts.length - 1 ? 4 : 1.5),
        pointBackgroundColor: '#6366f1',
        pointBorderColor: '#6366f1',
        pointHoverRadius: 6,
        fill: false,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#6366f1',
          borderWidth: 1,
          titleColor: '#a1a1aa',
          titleFont: { size: 11 },
          bodyColor: '#f4f4f5',

(function() {
  const feed = document.getElementById('activity-feed');
  const events = [];
  closedBets.forEach(b => events.push({
    type: b.result === 'WON' ? 'won' : 'lost',
    title: b.market || 'Unknown',
    meta: `${b.position || '?'} · ${fmtDate(b.resolved_at || b.placed_at)}`,
    right: (b.pl >= 0 ? '+' : '-') + '$' + Math.abs(b.pl || 0).toFixed(2),
    ts: new Date(b.resolved_at || b.placed_at)
  }));
  openBets.forEach(b => events.push({
    type: 'bet',
    title: b.market || 'Unknown',
    meta: `${b.position || '?'} · Placed ${timeAgo(b.placed_at)}`,
    right: '$' + (b.stake || 0).toFixed(2),
    ts: new Date(b.placed_at)
  }));
  DECISIONS.filter(d => !d.approved).slice(0, 5).forEach(d => events.push({
    type: 'skip',
    title: d.market_q || 'Unknown',
    meta: `Skipped · ${timeAgo(d.timestamp)}`,
    right: '',
    ts: new Date(d.timestamp)
  }));
  events.sort((a, b) => b.ts - a.ts);

    feed.innerHTML = '<div class="empty" style="border:none;padding:32px"><div class="empty-icon">📭</div><div class="empty-sub">No activity yet</div></div>';

  feed.innerHTML = recent.map(e => `
    <div class="activity-item">
      <div class="activity-icon ${e.type}">${icons[e.type]}</div>
      <div class="activity-body">
        <div class="activity-title">${e.title}</div>
        <div class="activity-meta">${e.meta}</div>
      </div>
      ${e.right ? `<div class="activity-right">${e.right}</div>` : ''}

})();

    <div><div class="hstat-label">Total Return</div><div class="hstat-val ${totalReturn >= 0 ? 'green' : 'red'}">${(totalReturn >= 0 ? '+' : '-')}$${Math.abs(totalReturn).toFixed(2)}</div></div>

// ─── DECISIONS LOG ───
(function() {
  const list = document.getElementById('dec-list');
  const filtersEl = document.getElementById('dec-filters');
  let filter = 'all';

  const betCount = DECISIONS.filter(d => d.approved).length;
  const skipCount = DECISIONS.filter(d => !d.approved).length;
  const highEdgeCount = DECISIONS.filter(d => d.edge != null && d.edge > 0.10).length;

  filtersEl.innerHTML = `
    <button class="dec-fbtn active" data-f="all">All (${DECISIONS.length})</button>
    <button class="dec-fbtn" data-f="bets">Bets (${betCount})</button>
    <button class="dec-fbtn" data-f="skips">Skips (${skipCount})</button>
    <button class="dec-fbtn" data-f="highedge">High Edge (${highEdgeCount})</button>
  `;

  function render() {
    let items = [...DECISIONS].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    if (filter === 'bets') items = items.filter(d => d.approved);
    else if (filter === 'skips') items = items.filter(d => !d.approved);
    else if (filter === 'highedge') items = items.filter(d => d.edge != null && d.edge > 0.10);

    if (!items.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No decisions found</div><div class="empty-sub">Scanner is running — decisions will appear here</div></div>';
      return;
    }

    list.innerHTML = items.map((d, i) => {
      const isBet = d.approved;
      const verdict = isBet ? 'BET' : 'SKIP';
      const edge = d.edge || 0;
      const conv = d.conviction || 0;
      const convColor = conv >= 70 ? 'var(--green)' : conv >= 50 ? 'var(--amber)' : 'var(--accent)';
      const marketName = d.market_q || 'Unknown market';
      const marketLink = d.polymarket_url
        ? `<a href="${d.polymarket_url}" target="_blank" rel="noopener">${marketName} <span class="ext">↗</span></a>`
        : marketName;

      // Expanded content
      const bayes = (d.bayes_updates || []).map(u =>
        `<li class="bayes-item">${u}</li>`
      ).join('');

      const signals = d.signal_breakdown
        ? Object.entries(d.signal_breakdown).map(([k, v]) => {
            let icon = '➖';
            const vs = String(v).toLowerCase();
            if (vs === 'true' || vs === 'bullish' || vs === 'yes' || vs.includes('agree')) icon = '✅';
            else if (vs === 'false' || vs === 'bearish' || vs === 'no' || vs.includes('disagree')) icon = '❌';
            return `<tr><td>${icon} ${k}</td><td>${v}</td></tr>`;
          }).join('')
        : '';

      const reasoning = d.reasoning || d.reason || 'No reasoning provided';
      const isRejected = !isBet && (d.reason || d.reasoning);

      return `
        <div class="dec-card ${isBet ? 'is-bet' : ''}" data-idx="${i}">
          <div class="dec-header">
            <div class="dec-pills">
              ${pill(verdict, isBet ? 'bet' : 'skip')}
              ${d.direction ? pill(d.direction, d.direction === 'YES' ? 'yes' : 'no') : ''}
            </div>
            <div class="dec-market">
              <div class="dec-market-name">${marketLink}</div>
            </div>
            <div class="dec-meta">
              <div class="dec-meta-item">
                <div class="dec-meta-label">Price</div>
                <div class="dec-meta-val">${fmtPct(d.price)}</div>
              </div>
              <div class="dec-meta-item">
                <div class="dec-meta-label">Edge</div>
                <div class="dec-meta-val" style="color:${edge > 0 ? 'var(--green)' : 'var(--t3)'}">${(edge*100).toFixed(1)}pp</div>
              </div>
              ${isBet ? `<div class="dec-meta-item"><div class="dec-meta-label">Stake</div><div class="dec-meta-val">$${fmt(d.stake)}</div></div>` : ''}
            </div>
            <div class="dec-ts">${timeAgo(d.timestamp)}</div>
            <svg class="dec-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </div>
          <div class="dec-conv-bar"><div class="dec-conv-fill" style="width:${clamp(conv,0,100)}%;background:${convColor}"></div></div>
          <div class="dec-expanded">
            <div class="dec-exp-inner">
              ${d.posterior || d.price ? `
              <div class="dec-prob-row">
                <div class="dec-prob-item">
                  <div class="dec-prob-label">Market Price</div>
                  <div class="dec-prob-val" style="color:var(--t2)">${fmtPct(d.price)}</div>
                </div>
                <div class="dec-prob-arrow">→</div>
                <div class="dec-prob-item">
                  <div class="dec-prob-label">Model Prob</div>
                  <div class="dec-prob-val" style="color:var(--accent)">${fmtPct(d.posterior)}</div>
                </div>
                <div style="flex:1"></div>
                <div class="dec-prob-item">
                  <div class="dec-prob-label">Edge</div>
                  <div class="dec-prob-val" style="color:${edge > 0 ? 'var(--green)' : 'var(--red)'}">${(edge*100).toFixed(1)}pp</div>
                </div>
              </div>` : ''}
              <div class="dec-exp-grid">
                <div>
                  ${bayes ? `<div class="exp-section-title">Bayesian Updates</div><ul class="bayes-list">${bayes}</ul>` : ''}
                </div>
                <div>
                  ${signals ? `<div class="exp-section-title">Signal Breakdown</div><table class="signal-table">${signals}</table>` : ''}
                </div>
              </div>
              <div class="exp-section-title">Reasoning</div>
              <div class="reasoning-block">${reasoning}</div>
              ${isRejected && d.reason ? `<div class="rejection-reason">⚠ ${d.reason}</div>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.dec-card').forEach(card => {
      card.querySelector('.dec-header').addEventListener('click', () => {
        card.classList.toggle('expanded');
      });
    });
  }

  filtersEl.addEventListener('click', e => {
    const btn = e.target.closest('.dec-fbtn');
    if (!btn) return;
    filtersEl.querySelectorAll('.dec-fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.f;
    render();
  });

  render();
})();

// ─── SYSTEM TAB ───
(function() {
  const cfgData = [
    ['Model', 'Bayesian + Kelly'],
    ['Min Edge', '6pp'],
    ['Kelly Fraction', '0.25×'],
    ['Max Stake', '$20'],
    ['Min Stake', '$2'],
    ['Scan Interval', '30 min'],
    ['LLM', 'Claude Opus'],
    ['Mode', 'Live trading'],
  ];
  document.getElementById('cfg-table').innerHTML = cfgData.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  const stateData = [
    ['Starting Capital', '$' + fmt(startCap)],
    ['Cash Available', '$' + fmt(P.cash)],
    ['Total Staked', '$' + fmt(totalStaked)],
    ['Portfolio Value', '$' + fmt(pv)],
    ['Net P&L', (totalPL >= 0 ? '+' : '') + '$' + Math.abs(totalPL).toFixed(2)],
    ['Open Bets', openBets.length],
    ['Closed Bets', closedBets.length],
    ['Win Rate', wr != null ? (wr*100).toFixed(0)+'%' : '—'],
  ];
  document.getElementById('pstate-table').innerHTML = stateData.map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  // Edge histogram
  const edges = DECISIONS.filter(d => d.edge != null).map(d => d.edge * 100);
  const edgeCtx = document.getElementById('edgeChart').getContext('2d');
  if (!edges.length) {
    edgeCtx.canvas.parentElement.innerHTML = '<div style="text-align:center;padding:40px;color:var(--t4);font-size:12px">No edge data available</div>';
  } else {
    const bins = [-20,-15,-10,-5,0,5,10,15,20,25,30];
    const counts = new Array(bins.length-1).fill(0);
    edges.forEach(e => {
      for (let i = 0; i < bins.length-1; i++) {
        if (e >= bins[i] && e < bins[i+1]) { counts[i]++; break; }
      }
    });
    new Chart(edgeCtx, {
      type: 'bar',
      data: {
        labels: bins.slice(0,-1).map((b,i) => `${b}–${bins[i+1]}`),
        datasets: [{
          data: counts,
          backgroundColor: bins.slice(0,-1).map(b => b >= 0 ? 'rgba(16,185,129,0.6)' : 'rgba(244,63,94,0.6)'),
          borderRadius: 3, borderSkipped: false
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a1a', borderColor: '#6366f1', borderWidth: 1,
            titleColor: '#a1a1aa', bodyColor: '#f4f4f5', cornerRadius: 6,
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#3f3f46', font: { size: 9 }, maxRotation: 30 }, border: { display: false } },
          y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#3f3f46', font: { size: 10 }, stepSize: 1 }, border: { display: false } }
        }
      }
    });
  }

  // Signal bars
  const signalBars = document.getElementById('signal-bars');
  const sigStats = {};
  closedBets.forEach(b => {
    const dec = DECISIONS.find(d => d.market_id === b.market_id || d.market_slug === (b.slug || b.market_slug));
    if (dec && dec.signal_breakdown) {
      Object.entries(dec.signal_breakdown).forEach(([sig]) => {
        if (!sigStats[sig]) sigStats[sig] = { wins: 0, total: 0 };
        sigStats[sig].total++;
        if (b.result === 'WON') sigStats[sig].wins++;
      });
    }
  });

  const sigEntries = Object.entries(sigStats);
  if (sigEntries.length > 0) {
    signalBars.innerHTML = sigEntries.map(([sig, s]) => {
      const rate = s.total > 0 ? s.wins / s.total : 0;
      return `
        <div class="signal-bar-item">
          <div class="signal-bar-label"><span>${sig}</span><span style="font-family:var(--mono);font-size:10px;color:var(--t4)">${(rate*100).toFixed(0)}% (${s.wins}/${s.total})</span></div>
          <div class="signal-bar-track"><div class="signal-bar-fill" style="width:${(rate*100).toFixed(0)}%;background:${rate >= 0.5 ? 'var(--green)' : 'var(--red)'}"></div></div>
        </div>`;
    }).join('');
  } else {
    // fallback: show signal usage from approved decisions
    const approved = DECISIONS.filter(d => d.approved && d.signal_breakdown);
    if (approved.length > 0) {
      const sigCounts = {};
      approved.forEach(d => Object.keys(d.signal_breakdown).forEach(k => sigCounts[k] = (sigCounts[k]||0)+1));
      const maxC = Math.max(...Object.values(sigCounts), 1);
      signalBars.innerHTML = Object.entries(sigCounts).map(([k,v]) => `
        <div class="signal-bar-item">
          <div class="signal-bar-label"><span>${k}</span><span style="font-family:var(--mono);font-size:10px;color:var(--t4)">${v} uses</span></div>
          <div class="signal-bar-track"><div class="signal-bar-fill" style="width:${(v/maxC*100).toFixed(0)}%"></div></div>
        </div>
      `).join('');
    } else {
      signalBars.innerHTML = '<div style="color:var(--t4);font-size:12px;padding:24px 0;text-align:center">Insufficient signal data</div>';
    }
  }

  // Scanner health
  const healthEl = document.getElementById('scanner-health');
  const lastScan = DECISIONS.length > 0
    ? [...DECISIONS].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))[0]
    : null;
  const betsPlaced = DECISIONS.filter(d => d.approved).length;
  const betsRate = DECISIONS.length > 0 ? (betsPlaced / DECISIONS.length * 100).toFixed(1) : '0.0';
  healthEl.innerHTML = `
    <div><div class="scanner-stat-label">Last Scan</div><div class="scanner-stat-val">${lastScan ? timeAgo(lastScan.timestamp) : '—'}</div></div>
    <div><div class="scanner-stat-label">Total Analyzed</div><div class="scanner-stat-val">${DECISIONS.length}</div></div>
    <div><div class="scanner-stat-label">Bets Placed</div><div class="scanner-stat-val">${betsPlaced}</div></div>
    <div><div class="scanner-stat-label">Bet Rate</div><div class="scanner-stat-val">${betsRate}%</div></div>
    <div><div class="scanner-stat-label">Markets/Scan</div><div class="scanner-stat-val">${DECISIONS.length || '—'}</div></div>
  `;
})();
</script>
</body>
</html>
